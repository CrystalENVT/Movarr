name: Run PyTest, Build Dockerfile, & check for Docker vulnerability
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
 BRANCH_NAME: ${{ github.head_ref || github.ref_name }}

jobs:
  pytest:
    name: PyTest Framework - Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Set up Python 3.14
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: 3.14

      - name: Install dependencies for testing
        run: |
          python -m pip install --root-user-action ignore --upgrade pip
          pip install --root-user-action ignore -r requirements.txt
          pip install --root-user-action ignore -r test_requirements.txt

      - name: Test with PyTest
        run: pytest --html=tests/Report.html --self-contained-html

      - name: PyTest Report Generation
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        if: success() || failure()
        with:
          name: Pytest_Report           # Name of the folder
          path: tests/Report.html           # Path to test results
  docker_build:
    needs: pytest
    name: Build, Test, & Publish Development Docker Image
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
    - name: Build image from Dockerfile
      run: docker build -t docker.io/crystalenvt/movarr:${{ github.sha }} .

    - name: Run Trivy vulnerability scanner against built image
      uses: aquasecurity/trivy-action@97e0b3872f55f89b95b2f65b3dbab56962816478 # 0.34.2
      with:
        image-ref: 'docker.io/crystalenvt/movarr:${{ github.sha }}'
        format: 'table'
        exit-code: '1'
        ignore-unfixed: true
        vuln-type: 'os,library'
        severity: 'CRITICAL,HIGH'

    - name: Log in to Docker Hub
      uses: docker/login-action@3227f5311cb93ffd14d13e65d8cc400d30f4dd8a
      with:
        username: ${{ vars.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Extract metadata (tags, labels) for Docker
      id: meta
      uses: docker/metadata-action@cb50be45084dde2f4465550fdd9e0abf61483be1
      with:
        images: crystalenvt/movarr

    - name: Build and push Docker image
      id: push
      uses: docker/build-push-action@38de52285e81fd0f16d3daa03e5191519d097b28
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: crystalenvt/movarr:${{ env.BRANCH_NAME }},crystalenvt/movarr:${{ env.BRANCH_NAME }}-${{ github.sha }}